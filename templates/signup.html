{% extends "base.html" %}
{% block content %}

<div class="auth_page">
    <div class="auth_card">
        <h1 class="auth_title">Create Account</h1>
        <p class="auth_sub">Already have an account? <a href="/login">Login here</a></p>

        {% if error %}
        <div class="alert alert_error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="property_form_group">
                <label class="property_form_label" for="name">Full Name</label>
                <input class="property_form_input" id="name" type="text" name="name"
                       placeholder="Your full name" required>
            </div>
            <div class="property_form_group">
                <label class="property_form_label" for="email">Email Address</label>
                <input class="property_form_input" id="email" type="email" name="email"
                       placeholder="you@example.com" required>
            </div>
            <div class="property_form_group">
                <label class="property_form_label" for="password">Password</label>
                <input class="property_form_input" id="password" type="password" name="password"
                       placeholder="At least 6 characters" required>
            </div>
            <div class="property_form_group">
                <label class="property_form_label" for="confirm">Confirm Password</label>
                <input class="property_form_input" id="confirm" type="password" name="confirm"
                       placeholder="Repeat your password" required>
            </div>
            <button class="auth_btn" type="submit">Create Account</button>
        </form>
    </div>
</div>

{% endblock %}
